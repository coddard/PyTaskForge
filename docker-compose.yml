services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./jobs:/app/jobs          # User scripts directory
      - ./data:/app/data          # SQLite database file
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
    restart: unless-stopped

